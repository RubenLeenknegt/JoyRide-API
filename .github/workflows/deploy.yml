# .github/workflows/deploy.yml
name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - main
      - update-workflow-scp

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Create .env file for backend
        run: |
          mkdir -p backend
          {
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
            echo "JWT_ISSUER=${{ secrets.JWT_ISSUER }}"
            echo "JWT_AUDIENCE=${{ secrets.JWT_AUDIENCE }}"
            echo "JWT_BACKEND_REALM=${{ secrets.JWT_BACKEND_REALM }}"
            echo "JWT_BACKEND_AUTH_NAME=${{ secrets.JWT_BACKEND_AUTH_NAME }}"
          } > backend/.env

      - name: Create .env file for project root
        run: |
          {
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
            echo "JWT_ISSUER=${{ secrets.JWT_ISSUER }}"
            echo "JWT_AUDIENCE=${{ secrets.JWT_AUDIENCE }}"
            echo "JWT_BACKEND_REALM=${{ secrets.JWT_BACKEND_REALM }}"
            echo "JWT_BACKEND_AUTH_NAME=${{ secrets.JWT_BACKEND_AUTH_NAME }}"
          } > .env

      - name: Build with Gradle inside Docker and run tests
        run: |
          docker run \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            gradle:8.5-jdk17 \
            ./gradlew :backend:test :backend:koverHtmlReport :backend:build
            
      - name: Upload test reports
        uses: actions/upload-artifact@v3
        with:
          name: backend-test-reports
          path: backend/build/reports/tests/test

      - name: Upload Kover coverage
        uses: actions/upload-artifact@v3
        with:
          name: backend-coverage-report
          path: backend/build/reports/kover/html


      # # - name: Build backend fat jar
      #   # run: ./gradlew :backend:shadowJar

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts
          
      - name: Copy project files to the staging server
        run: |
          rsync --archive --compress --progress --human-readable --rsh 'ssh -oPort=22 -i ~/.ssh/id_rsa' --exclude=".git" ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:~/fantastic-lamp
          
      - name: Run docker compose
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/fantastic-lamp
            if [[ "${{ GITHUB.REF_NAME }}" == "develop" ]]; then
              echo "Stopping and removing acc containers (down)"
              docker compose -f docker-compose.acc.yml -p fantastic-lamp-acc down -v|| echo "down command faalde"
              echo "Building latest acc images"
              docker compose -f docker-compose.acc.yml build
              echo "Starting containers"
              docker compose -f docker-compose.acc.yml -p fantastic-lamp-acc up --build -d
            elif [[ "${{ GITHUB.REF_NAME }}" == "update-workflow-scp" ]]; then
              echo "Stopping and removing acc containers (down)"
              docker compose -f docker-compose.acc.yml -p fantastic-lamp-acc down -v|| echo "down command faalde"
              echo "Building latest acc images"
              docker compose -f docker-compose.acc.yml build
              echo "Starting containers"
              docker compose -f docker-compose.acc.yml -p fantastic-lamp-acc up --build -d
            elif [[ "${{ GITHUB.REF_NAME }}" == "main" ]]; then
              echo "Stopping and removing containers (down)"
              docker compose -f docker-compose.prod.yml -p fantastic-lamp-prod down -v|| echo "down command faalde"
              echo "Building latest images"
              echo "Starting containers"
              docker compose -f docker-compose.prod.yml -p fantastic-lamp-prod up --build -d
            fi
