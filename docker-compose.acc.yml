# docker-compose.acc.yml
version: "3.9"

services:
  backend:
    build: ./backend
    image: gielvangaal/fantastic-lamp-backend:acc
    env_file: .env.acc
    ports:
      - "8081:8080"
    depends_on:
      - db

  db:
    image: mysql:8
    env_file: .env.acc
    volumes:
      - acc_db_data:/var/lib/mysql
      - ./db-init:/docker-entrypoint-initdb.d


  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    env_file: .env.acc
    ports:
      - "8083:80"
    depends_on:
      - db

volumes:
  acc_db_data:
